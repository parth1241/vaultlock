<svg width="1280" height="720" 
    viewBox="0 0 1280 720" 
    xmlns="http://www.w3.org/2000/svg">
    
    <!-- Background -->
    <rect width="1280" height="720" fill="#0d0d1f"/>
    
    <!-- Border -->
    <rect width="1280" height="720" 
      fill="none" 
      stroke="#6366f1" 
      stroke-width="2" 
      stroke-opacity="0.3"/>
    
    <!-- Center content -->
    <text 
      x="640" 
      y="320"
      text-anchor="middle" 
      font-family="monospace" 
      font-size="18" 
      fill="#6366f1"
      font-weight="bold">
      VaultLock
    </text>
    
    <text 
      x="640" 
      y="360"
      text-anchor="middle" 
      font-family="monospace" 
      font-size="14" 
      fill="#94a3b8">
      Landing Page
    </text>
    
    <text 
      x="640" 
      y="390"
      text-anchor="middle" 
      font-family="monospace" 
      font-size="11" 
      fill="#94a3b8"
      opacity="0.6">
      Replace with real screenshot
    </text>
    
    <text 
      x="640" 
      y="430"
      text-anchor="middle" 
      font-family="monospace" 
      font-size="11" 
      fill="#6366f1"
      opacity="0.5">
      Replace with real screenshot after running app
    </text>
    
    <!-- Dimensions label -->
    <text 
      x="1270" 
      y="710"
      text-anchor="end" 
      font-family="monospace" 
      font-size="10" 
      fill="#94a3b8"
      opacity="0.4">
      1280×720
    </text>
  </svg>