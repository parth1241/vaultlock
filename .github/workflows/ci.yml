name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-env: '18.x'
        cache: 'npm'
    - run: npm install
    - run: npm run build
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Security Scan
      run: |
        echo "Scanning for hardcoded secrets..."
        ! grep -r "NEXTAUTH_SECRET=" . --exclude-dir=node_modules
