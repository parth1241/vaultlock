name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          
      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli
        
      - name: Run Contract Tests
        run: cd contracts && cargo test --release

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Lint Frontend
        run: npm run lint
        
      - name: Build Frontend
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_HORIZON: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_TOKEN_CONTRACT_ID: CDCMF2JJNJBT64O7LBZQTQ2IJZ4EYTBMHWFZFZB3LLZGMUP52X3TCBVE
          NEXT_PUBLIC_POOL_CONTRACT_ID: CANRLOYU23VXBUDWWOC4PEAM2QSBVZM4PMWLQUCW3QCW6DAWPDX5LPSN
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: test-secret
          MONGODB_URI: mongodb://localhost:27017/vaultlock
        run: npm run build
